version: 1
backend:
  phases:
    build:
      commands:
        - pnpm install --frozen-lockfile
        - pnpx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID

applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        build:
          commands:
            - pnpm run build
      artifacts:
        baseDirectory: apps/web/dist
        files:
          - '**/*'
      cache:
        paths:
          - .turbo/**/*
          - node_modules/**/*